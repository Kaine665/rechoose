server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root /var/www/betterlife/current;
    index index.html;

    location = / {
        return 302 /landing/;
    }

    location = /landing {
        return 301 /landing/;
    }

    location /landing/ {
        try_files $uri $uri/ /landing/index.html;
    }

    location = /app {
        return 301 /app/;
    }

    location /app/ {
        try_files $uri $uri/ /app/index.html;
    }

    location = /app/sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location = /app/manifest.json {
        types { application/manifest+json json; }
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location = /api/waitlist {
        limit_req zone=waitlist burst=3 nodelay;
        limit_except POST { deny all; }

        proxy_pass http://127.0.0.1:3000/waitlist_entries;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store" always;
    }

    location ~ /\. {
        deny all;
    }
}
